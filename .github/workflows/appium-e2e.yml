name: Appium & Web E2E Mobile Automation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./appium-e2e/package-lock.json

      - name: Install Dependencies
        working-directory: ./appium-e2e
        run: npm install

      - name: Run 1,100+ Mega E2E Test Suite & Load Test Metrics
        working-directory: ./appium-e2e
        run: node scripts/run_e2e_reporter.js

      - name: Upload Selenium Excel Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Selenium-Excel-Report
          path: |
            appium-e2e/selenium-report.xlsx
            appium-e2e/excel/*.xlsx

      - name: Upload HTML Execution Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: HTML-Execution-Report
          path: |
            appium-e2e/execution-report.html
            appium-e2e/reports/execution-report.html
