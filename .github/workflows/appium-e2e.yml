name: Appium E2E Mobile Automation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: macos-latest # macOS is often preferred for mobile CI to support both iOS and Android if needed, but ubuntu can also work for Android.

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: Install dependencies
        working-directory: ./appium-e2e
        run: npm ci

      - name: Enable KVM group perms
        run: |
            echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
            sudo udevadm control --reload-rules
            sudo udevadm trigger --name-match=kvm
        if: runner.os == 'Linux'

      - name: Run Appium Tests on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86
          profile: pixel
          script: |
            cd appium-e2e
            npm run test:ci
        env:
          ENV: ci
          APP_PACKAGE: com.carepathai.app
          APP_ACTIVITY: com.carepathai.app.MainActivity

      - name: Upload Excel Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Excel-Report
          path: appium-e2e/excel/*.xlsx

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: HTML-Report
          path: appium-e2e/reports/

      - name: Upload Screenshots & Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Failure-Artifacts
          path: |
            appium-e2e/reports/failures/
            appium-e2e/logs/
